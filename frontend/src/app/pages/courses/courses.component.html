<div class="header-with-action">
    <h2>Available Courses</h2>
    <div class="add-course-form">
        <mat-form-field appearance="outline" dense>
            <mat-label>New Course Name</mat-label>
            <input matInput [(ngModel)]="newCourseName" placeholder="e.g. Software Testing" [disabled]="addingCourse" (keyup.enter)="addCourse()">
        </mat-form-field>
        <button mat-raised-button color="accent" (click)="addCourse()" [disabled]="!newCourseName.trim() || addingCourse">
            <mat-icon>add</mat-icon> ADD
        </button>
    </div>
</div>

<div *ngIf="loading" class="loading-container">
    <mat-spinner diameter="50"></mat-spinner>
</div>

<div *ngIf="error" class="error-message">
    <p>{{ error }}</p>
    <button mat-raised-button color="warn" (click)="fetchCourses()">Retry</button>
</div>

<div *ngIf="!loading && !error" class="courses-grid">
    <mat-card *ngFor="let course of courses" class="course-card">
        <mat-card-header>
            <mat-card-title>{{ course.name }}</mat-card-title>
        </mat-card-header>
        <mat-card-actions>
            <button mat-button color="primary" (click)="viewNotes(course.ID)">VIEW NOTES</button>
        </mat-card-actions>
    </mat-card>

    <div *ngIf="courses.length === 0" class="text-center">
        <p>No courses found.</p>
    </div>
</div>
